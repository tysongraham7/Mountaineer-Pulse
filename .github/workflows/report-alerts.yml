name: Bug Report Alerts

# Emails you when new in-app reports arrive, so you don't have to run read_reports.py to
# notice. Runs every few hours (reports are rare, so this is cheap) plus a manual button.
on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-pipeline
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Email new reports
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_ALERT_TO: ${{ secrets.REPORT_ALERT_TO }}
        run: python notify_reports.py
